<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Ultimate Portfolio System
</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
}

header h1{
    color:#60a5fa;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

section{
    padding:60px 0;
}

h2{
    color:#60a5fa;
}

form{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
}

input,
textarea{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.stats{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.stat-box{
    flex:1;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

#users{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.user-card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
}

.user-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

</style>

</head>

<body>

<header>

<h1>
Ultimate Portfolio System
</h1>

</header>

<div class="container">

<section>

<h2>
Статистика
</h2>

<div class="stats">

<div class="stat-box">
<h1 id="usersCount">0</h1>
<p>Пользователей</p>
</div>

<div class="stat-box">
<h1 id="viewsCount">0</h1>
<p>Просмотров</p>
</div>

<div class="stat-box">
<h1 id="activeCount">0</h1>
<p>Активных</p>
</div>

</div>

</section>

<section>

<h2>
Создание портфолио
</h2>

<form>

<input
id="name"
placeholder="Имя">

<textarea
id="about"
placeholder="О себе"></textarea>

<input
id="skills"
placeholder="Навыки">

<input
id="projects"
placeholder="Проекты">

<input
id="contacts"
placeholder="Контакты">

<input
id="github"
placeholder="GitHub">

<input
id="category"
placeholder="Категория">

<input
id="education"
placeholder="Образование">

<input
id="experience"
placeholder="Опыт">

<input
id="achievements"
placeholder="Достижения">

<input
id="photo"
placeholder="Ссылка на фото">

<button
type="button"
onclick="savePortfolio()">

Сохранить

</button>

</form>

</section>

<section>

<h2>
Поиск
</h2>

<input
id="searchInput"
placeholder="Введите запрос">

<button onclick="searchUsers()">
Поиск
</button>

</section>

<section>

<h2>
Пользователи
</h2>

<div id="users"></div>

</section>

</div>

<script>

async function savePortfolio(){

    const portfolio = {

        name:
        document.getElementById("name").value,

        about:
        document.getElementById("about").value,

        skills:
        document.getElementById("skills").value,

        projects:
        document.getElementById("projects").value,

        contacts:
        document.getElementById("contacts").value,

        github:
        document.getElementById("github").value,

        category:
        document.getElementById("category").value,

        education:
        document.getElementById("education").value,

        experience:
        document.getElementById("experience").value,

        achievements:
        document.getElementById("achievements").value,

        photo:
        document.getElementById("photo").value

    };

    await fetch("/save", {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(portfolio)

    });

    alert("Портфолио сохранено");

    loadUsers();
    loadStats();

}

async function loadStats(){

    const response =
    await fetch("/stats");

    const data =
    await response.json();

    document.getElementById("usersCount")
    .innerHTML = data.users;

    document.getElementById("viewsCount")
    .innerHTML = data.views;

    document.getElementById("activeCount")
    .innerHTML = data.active;

}

async function loadUsers(){

    const response =
    await fetch("/users");

    const users =
    await response.json();

    const usersDiv =
    document.getElementById("users");

    usersDiv.innerHTML = "";

    users.forEach(user => {

        usersDiv.innerHTML += `

        <div class="user-card">

        <img src="${user.photo}">

        <h2>${user.name}</h2>

        <p>${user.about}</p>

        <p>🛠 ${user.skills}</p>

        <p>📂 ${user.projects}</p>

        <p>📞 ${user.contacts}</p>

        <p>🌐 ${user.github}</p>

        <p>💼 ${user.category}</p>

        </div>

        `;

    });

}

async function searchUsers(){

    const query =
    document.getElementById("searchInput")
    .value;

    const response =
    await fetch(`/search/${query}`);

    const users =
    await response.json();

    const usersDiv =
    document.getElementById("users");

    usersDiv.innerHTML = "";

    users.forEach(user => {

        usersDiv.innerHTML += `

        <div class="user-card">

        <img src="${user.photo}">

        <h2>${user.name}</h2>

        <p>${user.about}</p>

        <p>🛠 ${user.skills}</p>

        <p>🌐 ${user.github}</p>

        </div>

        `;

    });

}

loadUsers();
loadStats();

</script>

</body>
</html>
